name: Release

on:
  push:
    tags: ['v*']          # attrape v1.2.3 ET les pré-releases v1.2.3-rc1
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # Re-run the same gates the CI runs, locked to a single OS for speed.
      # The full matrix already ran on the commit being tagged.
      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

      - name: test (--all-features)
        run: cargo test --all-features

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF##refs/tags/v}"
          tag="${tag%%-*}"   # ignore le suffixe pré-release (-rc/-beta)
          crate_version="$(cargo pkgid | awk -F'[#@]' '{print $NF}')"
          if [ "$tag" != "$crate_version" ]; then
            echo "::error::Tag v$tag does not match Cargo.toml version $crate_version"
            exit 1
          fi
          echo "Releasing version $crate_version"

      - name: cargo publish --dry-run
        run: cargo publish --all-features --dry-run

  publish-crate:
    name: Publish to crates.io
    needs: verify
    # Pas de publish sur les pré-releases (v*-rc/-beta) : un publish crates.io est
    # définitif (on ne peut que « yank »). Gaté au niveau du job pour qu'un tag
    # pré-release ne déclenche même pas de demande d'approbation.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write        # nécessaire pour demander le jeton OIDC à GitHub
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Trusted Publishing : aucun secret longue durée. GitHub atteste l'identité
      # du workflow (repo + fichier + environnement), crates.io vérifie cette
      # attestation contre la config enregistrée et émet un jeton éphémère,
      # révoqué automatiquement en fin de job.
      - name: Get a temporary crates.io token (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --all-features

  github-release:
    name: GitHub release
    needs: [verify, publish-crate]
    # publish-crate est volontairement skippé sur les pré-releases : la release
    # GitHub doit quand même se faire. On exige donc « verify OK » et « publish
    # pas en échec » (skipped compris).
    if: ${{ always() && needs.verify.result == 'success' && needs.publish-crate.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          # Les tags pré-release (v1.2.3-rc1, -beta…) sont marqués « pre-release ».
          prerelease: ${{ contains(github.ref_name, '-') }}
